<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tauren shared session</title>
  <style>
    :root {
      color-scheme: dark light;
      --bg: #05080b;
      --fg: #fbf1df;
      --muted: #c5b8a6;
      --card: rgba(7, 12, 16, 0.72);
      --border: rgba(244, 232, 207, 0.16);
      --accent: #d6aa72;
      --danger: #f08b7f;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #faf7ef;
        --fg: #1d1712;
        --muted: #594f45;
        --card: rgba(255, 255, 255, 0.74);
        --border: rgba(68, 54, 39, 0.16);
        --accent: #8a5b2f;
        --danger: #b2483d;
      }
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .shell {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(620px, 100%);
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--card);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.24);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 24px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.55;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 0.95em;
    }

    .error {
      color: var(--danger);
    }

    .viewer {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: transparent;
    }

    body.loaded {
      overflow: hidden;
    }

    body.loaded .shell {
      display: none;
    }
  </style>
</head>
<body>
  <main class="shell" id="shell">
    <section class="card" aria-live="polite">
      <p class="eyebrow">Tauren share viewer</p>
      <h1 id="title">Loading shared session…</h1>
      <p id="message">Fetching the exported Pi session from GitHub Gist.</p>
    </section>
  </main>
  <iframe
    id="viewer"
    class="viewer"
    title="Shared Tauren session"
    sandbox="allow-scripts allow-same-origin allow-downloads"
    hidden></iframe>

  <script>
    (function () {
      'use strict';

      const knownParamNames = new Set(['gist', 'gistId', 'id', 'session', 'leafId', 'targetId']);
      const shell = document.getElementById('shell');
      const title = document.getElementById('title');
      const message = document.getElementById('message');
      const viewer = document.getElementById('viewer');
      const taurenExportSkinStyleId = 'tauren-export-skin';
      const taurenExportSkinCss = `
/* Tauren export skin: overrides Pi export variables without replacing Pi's renderer. */
:root {
  color-scheme: light dark;
  --line-height: 23px;
  --body-bg: #faf7ef;
  --container-bg: rgba(255, 255, 255, 0.74);
  --info-bg: #f2eee5;

  --text: #1d1712;
  --muted: #594f45;
  --dim: rgba(72, 56, 40, 0.48);
  --accent: #8a5b2f;
  --border: #ad7a43;
  --borderAccent: #8a5b2f;
  --selectedBg: rgba(173, 122, 67, 0.14);
  --hover: rgba(173, 122, 67, 0.12);

  --success: #4f7f42;
  --error: #b2483d;
  --warning: #ad7a43;

  --userMessageBg: rgba(255, 255, 255, 0.74);
  --userMessageText: #1d1712;
  --customMessageBg: rgba(173, 122, 67, 0.12);
  --customMessageText: #1d1712;
  --customMessageLabel: #8a5b2f;
  --toolPendingBg: rgba(173, 122, 67, 0.10);
  --toolSuccessBg: rgba(79, 127, 66, 0.12);
  --toolErrorBg: rgba(178, 72, 61, 0.12);
  --toolOutput: #594f45;
  --toolDiffAdded: #4f7f42;
  --toolDiffRemoved: #b2483d;
  --toolDiffContext: #594f45;

  --thinkingText: #594f45;
  --mdHeading: #8a5b2f;
  --mdLink: #8a5b2f;
  --mdCode: #8a5b2f;
  --mdCodeBlockBorder: rgba(72, 56, 40, 0.16);
  --mdQuote: #594f45;
  --mdQuoteBorder: #ad7a43;
  --mdHr: rgba(72, 56, 40, 0.16);
  --mdListBullet: #ad7a43;

  --syntaxComment: #6f7157;
  --syntaxKeyword: #8a5b2f;
  --syntaxFunction: #9d6f3b;
  --syntaxVariable: #4f6470;
  --syntaxString: #8f5f3f;
  --syntaxNumber: #6d743f;
  --syntaxType: #6b6a2f;
  --syntaxOperator: #594f45;
  --syntaxPunctuation: #594f45;
}

@media (prefers-color-scheme: dark) {
  :root {
    --body-bg: #05080b;
    --container-bg: rgba(7, 12, 16, 0.72);
    --info-bg: rgba(214, 170, 114, 0.12);

    --text: #fbf1df;
    --muted: #c5b8a6;
    --dim: rgba(244, 232, 207, 0.38);
    --accent: #d6aa72;
    --border: #d6aa72;
    --borderAccent: #f1d7ad;
    --selectedBg: rgba(214, 170, 114, 0.16);
    --hover: rgba(214, 170, 114, 0.14);

    --success: #8fbf7f;
    --error: #f08b7f;
    --warning: #d6aa72;

    --userMessageBg: rgba(10, 15, 19, 0.78);
    --userMessageText: #fbf1df;
    --customMessageBg: rgba(214, 170, 114, 0.12);
    --customMessageText: #fbf1df;
    --customMessageLabel: #f1d7ad;
    --toolPendingBg: rgba(214, 170, 114, 0.10);
    --toolSuccessBg: rgba(143, 191, 127, 0.12);
    --toolErrorBg: rgba(240, 139, 127, 0.12);
    --toolOutput: #c5b8a6;
    --toolDiffAdded: #8fbf7f;
    --toolDiffRemoved: #f08b7f;
    --toolDiffContext: #c5b8a6;

    --thinkingText: #c5b8a6;
    --mdHeading: #f1d7ad;
    --mdLink: #d6aa72;
    --mdCode: #f1d7ad;
    --mdCodeBlockBorder: rgba(244, 232, 207, 0.15);
    --mdQuote: #c5b8a6;
    --mdQuoteBorder: #d6aa72;
    --mdHr: rgba(244, 232, 207, 0.15);
    --mdListBullet: #d6aa72;

    --syntaxComment: #8a8f75;
    --syntaxKeyword: #d6aa72;
    --syntaxFunction: #f1d7ad;
    --syntaxVariable: #a8c7d8;
    --syntaxString: #e2b08b;
    --syntaxNumber: #b8c98a;
    --syntaxType: #c8c07a;
    --syntaxOperator: #c5b8a6;
    --syntaxPunctuation: #c5b8a6;
  }
}

body {
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 15px;
  letter-spacing: -0.01em;
}

#sidebar,
.sidebar-search,
.filter-btn,
.sidebar-close,
.tree-prefix,
.tool-command,
.tool-output,
.tool-output pre,
.tool-output code,
.tool-diff,
.markdown-content pre,
.markdown-content pre code,
.markdown-content code,
.line-numbers,
.line-count {
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
}

.user-message,
.tool-execution,
.session-info,
.system-prompt,
.tools-section,
.skill-user-entry,
.skill-invocation {
  border: 1px solid var(--mdHr);
  border-radius: 10px;
}

.copy-link-btn,
.filter-btn,
.sidebar-search,
.sidebar-close {
  border-radius: 8px;
}

.system-prompt-preview,
.system-prompt-full,
.tool-item,
.tool-param,
.tool-param-required,
.tool-param-optional {
  font-size: 14px;
  line-height: 21px;
}

.system-prompt-note,
.tool-params-hint {
  font-size: 13px;
  line-height: 20px;
}

.ansi-rendered [style*="color:#626262"],
.ansi-rendered [style*="color: #626262"] {
  color: var(--muted) !important;
}

.ansi-rendered [style*="color:#808080"],
.ansi-rendered [style*="color: #808080"] {
  color: var(--dim) !important;
}

.ansi-rendered [style*="color:#afaf5f"],
.ansi-rendered [style*="color: #afaf5f"] {
  color: var(--accent) !important;
}

.ansi-rendered [style*="background-color:#005f00"],
.ansi-rendered [style*="background-color: #005f00"] {
  background-color: rgba(79, 127, 66, 0.18) !important;
  color: var(--text) !important;
}

@media (prefers-color-scheme: dark) {
  .ansi-rendered [style*="background-color:#005f00"],
  .ansi-rendered [style*="background-color: #005f00"] {
    background-color: rgba(143, 191, 127, 0.18) !important;
    color: var(--text) !important;
  }
}
`;

      function setStatus(nextTitle, nextMessage, error) {
        title.textContent = nextTitle;
        message.textContent = nextMessage;
        message.classList.toggle('error', Boolean(error));
      }

      function appendParams(target, source) {
        for (const [key, value] of source.entries()) {
          if (isGistQueryParam(key, value)) {
            continue;
          }
          target.append(key, value);
        }
      }

      function isGistQueryParam(key, value) {
        if ((key === 'gist' || key === 'gistId' || key === 'id' || key === 'session') && value) {
          return true;
        }

        return value === '' && !knownParamNames.has(key);
      }

      function parseShareRequest() {
        const params = new URLSearchParams();
        const search = new URLSearchParams(window.location.search);
        let gistId = search.get('gistId') || search.get('gist') || search.get('id') || search.get('session') || '';

        for (const [key, value] of search.entries()) {
          if (!gistId && value === '' && !knownParamNames.has(key)) {
            gistId = key;
            continue;
          }

          if (isGistQueryParam(key, value)) {
            continue;
          }

          params.append(key, value);
        }

        const hash = window.location.hash.replace(/^#/, '');
        if (hash) {
          const separatorIndex = hash.indexOf('?');
          const hashId = separatorIndex >= 0 ? hash.slice(0, separatorIndex) : hash;
          const hashQuery = separatorIndex >= 0 ? hash.slice(separatorIndex + 1) : '';

          if (!gistId && hashId && !hashId.includes('=')) {
            gistId = hashId;
          } else if (!gistId && hash.includes('=')) {
            const hashParams = new URLSearchParams(hash);
            gistId = hashParams.get('gistId') || hashParams.get('gist') || hashParams.get('id') || hashParams.get('session') || '';
            appendParams(params, hashParams);
          }

          if (hashQuery) {
            appendParams(params, new URLSearchParams(hashQuery));
          }
        }

        gistId = gistId.trim();
        if (!/^[a-zA-Z0-9]+$/.test(gistId)) {
          return { gistId: '', params };
        }

        return { gistId, params };
      }

      async function fetchSessionHtml(gistId) {
        const gistResponse = await fetch('https://api.github.com/gists/' + encodeURIComponent(gistId), {
          headers: { Accept: 'application/vnd.github+json' }
        });

        if (!gistResponse.ok) {
          throw new Error('GitHub returned ' + gistResponse.status + ' for this Gist.');
        }

        const gist = await gistResponse.json();
        const files = gist && gist.files ? gist.files : {};
        const file = files['session.html'] || Object.values(files).find((entry) => {
          return entry && typeof entry.filename === 'string' && entry.filename.toLowerCase().endsWith('.html');
        });

        if (!file || !file.raw_url) {
          throw new Error('This Gist does not contain a session.html file.');
        }

        const rawResponse = await fetch(file.raw_url);
        if (!rawResponse.ok) {
          throw new Error('GitHub returned ' + rawResponse.status + ' while fetching session.html.');
        }

        return await rawResponse.text();
      }

      function escapeAttribute(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/"/g, '&quot;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function injectTaurenExportSkin(html) {
        const style = '<style id="' + taurenExportSkinStyleId + '">\n' + taurenExportSkinCss.trim() + '\n</style>';
        const existingStylePattern = new RegExp("<style\\s+id=[\"']" + taurenExportSkinStyleId + "[\"'][^>]*>[\\s\\S]*?<\\/style>", 'i');

        if (existingStylePattern.test(html)) {
          return html.replace(existingStylePattern, style);
        }

        if (/<\/head>/i.test(html)) {
          return html.replace(/<\/head>/i, style + '\n</head>');
        }

        return style + '\n' + html;
      }

      function injectViewerMetadata(html, gistId, params) {
        const baseUrl = window.location.origin + window.location.pathname + '?' + encodeURIComponent(gistId);
        const metadata = [
          '<meta name="pi-share-base-url" content="' + escapeAttribute(baseUrl) + '">',
          '<meta name="pi-url-params" content="' + escapeAttribute(params.toString()) + '">'
        ].join('\n  ');

        if (/<\/head>/i.test(html)) {
          return html.replace(/<\/head>/i, metadata + '\n</head>');
        }

        return metadata + '\n' + html;
      }

      async function main() {
        const request = parseShareRequest();

        if (!request.gistId) {
          setStatus('Missing shared session', 'Open this page with a Gist ID, for example /share/#GIST_ID.', true);
          return;
        }

        try {
          const html = await fetchSessionHtml(request.gistId);
          const skinnedHtml = injectTaurenExportSkin(html);
          viewer.srcdoc = injectViewerMetadata(skinnedHtml, request.gistId, request.params);
          viewer.hidden = false;
          shell.hidden = true;
          document.body.classList.add('loaded');
        } catch (error) {
          setStatus(
            'Could not load shared session',
            error instanceof Error ? error.message : 'Unknown error while loading this shared session.',
            true
          );
        }
      }

      main();
    }());
  </script>
</body>
</html>
